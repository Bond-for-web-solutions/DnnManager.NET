# Shared SQL Server for all DnnManager projects.
# This file ships next to the app (copied to the build output / publish folder) and is the single
# compose file the tool runs - there is no per-project compose. One shared container, fixed port 1433.
# Keep these values in sync with the "Docker" section of appsettings.json (the tool connects using
# those settings).
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: dnn-sqlserver
    hostname: dnn-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Admin@123
      - MSSQL_SA_PASSWORD=Admin@123
      - MSSQL_PID=Developer
      - MSSQL_COLLATION=Latin1_General_CI_AS
    ports:
      - "1433:1433"
    volumes:
      - dnn_sqlserver_data:/var/opt/mssql
    restart: unless-stopped
    networks:
      - dnn_network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Admin@123 -C -No -Q "SELECT 1"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  dnn_sqlserver_data:
    name: dnn_sqlserver_data

networks:
  dnn_network:
    driver: bridge
    name: dnn_network
